# 单机自包含部署（如 N100）：前端 + 后端(local 嵌入) + Qdrant，全部跑在一台机器，
# 不依赖任何 GPU 机。嵌入/重排在后端进程内用 CPU 跑（查询轻量；大文档灌库慢，
# 建议「在 GPU 机灌好 → 导出 .kb.zip → 本机前端导入」的方式补充知识库）。
#
# 启动：docker compose -f docker-compose.app.local.yml up -d --build
services:
  qdrant:
    image: qdrant/qdrant:latest      # 与灌库端保持同一 tag，保证快照可恢复
    container_name: chunkpilot-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    container_name: chunkpilot-backend
    environment:
      - RAG_EMBEDDING_MODE=local        # 进程内嵌入/重排，不连 GPU 机
      - RAG_QDRANT_URL=http://qdrant:6333
      - RAG_DOCS_DIR=/app/docs
      - RAG_DATA_DIR=/app/data
      - RAG_EMBED_BATCH=8               # CPU 上调小批量，降低内存峰值
      # 国内拉 HuggingFace 慢/不通时启用镜像（按需保留）
      - HF_ENDPOINT=https://hf-mirror.com
      - HF_HOME=/app/hf_cache
    volumes:
      - ./docs:/app/docs               # 文档存储（与宿主共享）
      - backend_data:/app/data         # doc_meta.json 等运行时状态
      - hf_cache:/app/hf_cache         # 模型权重缓存，避免重建重下
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: chunkpilot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
  backend_data:
  hf_cache:
